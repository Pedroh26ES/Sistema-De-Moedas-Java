<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="2050" viewBox="0 0 1700 2050">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111" />
    </marker>
    <style>
      .title { font: bold 20px Arial, sans-serif; }
      .label { font: 15px Arial, sans-serif; }
      .small { font: 13px Arial, sans-serif; }
      .box { fill: #e8e8f4; stroke: #111; stroke-width: 1.4; }
      .section { fill: #fff; stroke: #111; stroke-width: 2; }
      .note { fill: #fffde6; stroke: #888; stroke-width: 1; }
      .life { stroke: #777; stroke-width: 1; stroke-dasharray: 6 6; }
      .msg { stroke: #111; stroke-width: 1.5; marker-end: url(#arrow); }
      .ret { stroke: #111; stroke-width: 1.2; stroke-dasharray: 4 4; marker-end: url(#arrow); }
      .frame { fill: none; stroke: #111; stroke-width: 2; }
      .divider { stroke: #111; stroke-width: 1; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <text x="850" y="30" text-anchor="middle" class="title">Diagrama de Sequencia Completo - Valoriza Ae - RF-01 a RF-17</text>

  <!-- Atores -->
  <g transform="translate(80,65)">
    <circle cx="0" cy="0" r="12" fill="#f4f4ff" stroke="#111" />
    <line x1="0" y1="12" x2="0" y2="48" stroke="#111" />
    <line x1="-24" y1="25" x2="24" y2="25" stroke="#111" />
    <line x1="0" y1="48" x2="-22" y2="82" stroke="#111" />
    <line x1="0" y1="48" x2="22" y2="82" stroke="#111" />
    <text x="0" y="105" text-anchor="middle" class="label">Aluno</text>
  </g>
  <g transform="translate(190,65)">
    <circle cx="0" cy="0" r="12" fill="#f4f4ff" stroke="#111" />
    <line x1="0" y1="12" x2="0" y2="48" stroke="#111" />
    <line x1="-24" y1="25" x2="24" y2="25" stroke="#111" />
    <line x1="0" y1="48" x2="-22" y2="82" stroke="#111" />
    <line x1="0" y1="48" x2="22" y2="82" stroke="#111" />
    <text x="0" y="105" text-anchor="middle" class="label">Professor</text>
  </g>
  <g transform="translate(300,65)">
    <circle cx="0" cy="0" r="12" fill="#f4f4ff" stroke="#111" />
    <line x1="0" y1="12" x2="0" y2="48" stroke="#111" />
    <line x1="-24" y1="25" x2="24" y2="25" stroke="#111" />
    <line x1="0" y1="48" x2="-22" y2="82" stroke="#111" />
    <line x1="0" y1="48" x2="22" y2="82" stroke="#111" />
    <text x="0" y="105" text-anchor="middle" class="label">Empresa</text>
  </g>

  <!-- Participantes -->
  <rect x="400" y="55" width="140" height="60" rx="4" class="box" />
  <text x="470" y="82" text-anchor="middle" class="label">Interface</text>
  <text x="470" y="101" text-anchor="middle" class="small">Web/React</text>

  <rect x="625" y="55" width="190" height="60" rx="4" class="box" />
  <text x="720" y="82" text-anchor="middle" class="label">Sistema Valoriza Ae</text>
  <text x="720" y="101" text-anchor="middle" class="small">Controllers + Services</text>

  <!-- Banco de Dados em cilindro vertical -->
  <g>
    <ellipse cx="980" cy="62" rx="58" ry="18" fill="#e8e8f4" stroke="#111" stroke-width="1.4" />
    <rect x="922" y="62" width="116" height="58" fill="#e8e8f4" stroke="#111" stroke-width="1.4" />
    <ellipse cx="980" cy="120" rx="58" ry="18" fill="#dedeef" stroke="#111" stroke-width="1.4" />
    <text x="980" y="91" text-anchor="middle" class="label">Banco de</text>
    <text x="980" y="110" text-anchor="middle" class="label">Dados</text>
  </g>

  <rect x="1100" y="55" width="120" height="60" rx="4" class="box" />
  <text x="1160" y="91" text-anchor="middle" class="label">ViaCEP</text>

  <rect x="1270" y="55" width="150" height="60" rx="4" class="box" />
  <text x="1345" y="82" text-anchor="middle" class="label">Sistema de</text>
  <text x="1345" y="101" text-anchor="middle" class="label">Notificacao</text>

  <!-- RabbitMQ em cilindro horizontal (cilindro rotacionado 90 graus) -->
  <g>
    <rect x="1475" y="63" width="150" height="54" fill="#e8e8f4" stroke="#111" stroke-width="1.4" />
    <ellipse cx="1475" cy="90" rx="18" ry="27" fill="#e8e8f4" stroke="#111" stroke-width="1.4" />
    <ellipse cx="1625" cy="90" rx="18" ry="27" fill="#dedeef" stroke="#111" stroke-width="1.4" />
    <text x="1550" y="95" text-anchor="middle" class="label">RabbitMQ</text>
  </g>

  <!-- Lifelines -->
  <line x1="80" y1="130" x2="80" y2="1985" class="life" />
  <line x1="190" y1="130" x2="190" y2="1985" class="life" />
  <line x1="300" y1="130" x2="300" y2="1985" class="life" />
  <line x1="470" y1="130" x2="470" y2="1985" class="life" />
  <line x1="720" y1="130" x2="720" y2="1985" class="life" />
  <line x1="980" y1="130" x2="980" y2="1985" class="life" />
  <line x1="1160" y1="130" x2="1160" y2="1985" class="life" />
  <line x1="1345" y1="130" x2="1345" y2="1985" class="life" />
  <line x1="1550" y1="130" x2="1550" y2="1985" class="life" />

  <!-- Secao 1 -->
  <rect x="40" y="150" width="1620" height="34" class="section" />
  <text x="850" y="173" text-anchor="middle" class="title">1. Conta, Cadastro, Identidade e CEP (RF-01 a RF-04, RF-13)</text>
  <rect x="55" y="205" width="1560" height="255" class="frame" />
  <text x="65" y="225" class="small">alt</text>
  <text x="105" y="225" class="small">[dados invalidos ou duplicados / dados validos]</text>
  <line x1="80" y1="250" x2="470" y2="250" class="msg" /><text x="170" y="242" class="label">1.1 solicitarCadastroAluno(dados)</text>
  <line x1="470" y1="295" x2="720" y2="295" class="msg" /><text x="500" y="287" class="label">1.2 cadastrarAluno(dados)</text>
  <rect x="730" y="310" width="230" height="42" class="note" /><text x="740" y="335" class="small">Valida identidade do produto, CPF, RG, curso e instituicao</text>
  <line x1="720" y1="375" x2="980" y2="375" class="msg" /><text x="755" y="367" class="label">1.3 validarDadosAcademicos()</text>
  <line x1="980" y1="405" x2="720" y2="405" class="ret" /><text x="805" y="398" class="label">1.4 resultadoValidacao</text>
  <line x1="720" y1="435" x2="1160" y2="435" class="msg" /><text x="790" y="427" class="label">1.5 consultarEnderecoViaCep(cep)</text>
  <line x1="1160" y1="455" x2="720" y2="455" class="ret" /><text x="830" y="448" class="label">1.6 enderecoFormatado</text>

  <!-- Secao 2 -->
  <rect x="40" y="500" width="1620" height="34" class="section" />
  <text x="850" y="523" text-anchor="middle" class="title">2. Envio de Moedas e Rastreabilidade (RF-05, RF-11, RF-12, RF-14, RF-15)</text>
  <rect x="55" y="555" width="1560" height="270" class="frame" />
  <text x="65" y="575" class="small">alt</text>
  <text x="105" y="575" class="small">[saldo insuficiente ou motivo ausente / envio permitido]</text>
  <line x1="190" y1="605" x2="470" y2="605" class="msg" /><text x="225" y="597" class="label">2.1 enviarMoedas(aluno, valor, motivo)</text>
  <line x1="470" y1="645" x2="720" y2="645" class="msg" /><text x="500" y="637" class="label">2.2 registrarEnvioMoedas()</text>
  <line x1="720" y1="685" x2="980" y2="685" class="msg" /><text x="760" y="677" class="label">2.3 validarProfessorAlunoSaldo()</text>
  <line x1="980" y1="715" x2="720" y2="715" class="ret" /><text x="810" y="708" class="label">2.4 envioPermitido</text>
  <line x1="720" y1="750" x2="1345" y2="750" class="msg" /><text x="810" y="742" class="label">2.5 notificarAlunoEProfessor()</text>
  <line x1="720" y1="785" x2="1550" y2="785" class="msg" /><text x="830" y="777" class="label">2.6 publicarMOEDAS_ENVIADAS()</text>

  <!-- Secao 3 -->
  <rect x="40" y="865" width="1620" height="34" class="section" />
  <text x="850" y="888" text-anchor="middle" class="title">3. Consulta do Aluno, Extratos e Filtros (RF-06, RF-11, RF-12)</text>
  <rect x="55" y="920" width="1560" height="210" class="frame" />
  <text x="65" y="940" class="small">loop</text>
  <text x="105" y="940" class="small">[para cada transacao ou notificacao retornada]</text>
  <line x1="80" y1="970" x2="470" y2="970" class="msg" /><text x="150" y="962" class="label">3.1 abrirPainelAluno(filtro)</text>
  <line x1="470" y1="1010" x2="720" y2="1010" class="msg" /><text x="500" y="1002" class="label">3.2 carregarDadosAluno()</text>
  <line x1="720" y1="1050" x2="980" y2="1050" class="msg" /><text x="755" y="1042" class="label">3.3 buscarExtratoCatalogoCupons()</text>
  <line x1="980" y1="1080" x2="720" y2="1080" class="ret" /><text x="810" y="1073" class="label">3.4 dadosConsolidados</text>
  <line x1="720" y1="1110" x2="470" y2="1110" class="ret" /><text x="515" y="1103" class="label">3.5 painelComStatus</text>

  <!-- Secao 4 -->
  <rect x="40" y="1170" width="1620" height="34" class="section" />
  <text x="850" y="1193" text-anchor="middle" class="title">4. Resgate de Vantagem, Cupom Unico e QR Code (RF-07, RF-08, RF-10)</text>
  <rect x="55" y="1225" width="1560" height="285" class="frame" />
  <text x="65" y="1245" class="small">alt</text>
  <text x="105" y="1245" class="small">[resgate duplicado ou saldo insuficiente / resgate permitido]</text>
  <line x1="80" y1="1275" x2="470" y2="1275" class="msg" /><text x="140" y="1267" class="label">4.1 resgatarVantagem(vantagem)</text>
  <line x1="470" y1="1315" x2="720" y2="1315" class="msg" /><text x="500" y="1307" class="label">4.2 validarSaldoDuplicidade()</text>
  <line x1="720" y1="1355" x2="980" y2="1355" class="msg" /><text x="755" y="1347" class="label">4.3 consultarCuponsAtivos()</text>
  <line x1="980" y1="1385" x2="720" y2="1385" class="ret" /><text x="790" y="1378" class="label">4.4 resgatePermitido</text>
  <line x1="720" y1="1420" x2="980" y2="1420" class="msg" /><text x="755" y="1412" class="label">4.5 salvarCupomUnico()</text>
  <line x1="720" y1="1460" x2="1345" y2="1460" class="msg" /><text x="820" y="1452" class="label">4.6 enviarCupomAlunoParceiro()</text>
  <line x1="720" y1="1490" x2="1550" y2="1490" class="msg" /><text x="825" y="1482" class="label">4.7 publicarCUPOM_GERADO()</text>

  <!-- Secao 5 -->
  <rect x="40" y="1550" width="1620" height="34" class="section" />
  <text x="850" y="1573" text-anchor="middle" class="title">5. Validacao de Cupom, Integracoes e Documentacao (RF-09, RF-14, RF-15, RF-16, RF-17)</text>
  <rect x="55" y="1605" width="1560" height="310" class="frame" />
  <text x="65" y="1625" class="small">alt</text>
  <text x="105" y="1625" class="small">[cupom invalido / cupom valido]</text>
  <line x1="300" y1="1660" x2="470" y2="1660" class="msg" /><text x="320" y="1652" class="label">5.1 validarCupom(codigo)</text>
  <line x1="470" y1="1700" x2="720" y2="1700" class="msg" /><text x="505" y="1692" class="label">5.2 consultarCupom()</text>
  <line x1="720" y1="1740" x2="980" y2="1740" class="msg" /><text x="755" y="1732" class="label">5.3 buscarCupomDaEmpresa()</text>
  <line x1="980" y1="1770" x2="720" y2="1770" class="ret" /><text x="805" y="1763" class="label">5.4 cupomValido</text>
  <line x1="720" y1="1805" x2="980" y2="1805" class="msg" /><text x="755" y="1797" class="label">5.5 marcarCupomValidado()</text>
  <line x1="720" y1="1840" x2="1345" y2="1840" class="msg" /><text x="820" y="1832" class="label">5.6 notificarValidacaoEmailWhatsApp()</text>
  <line x1="720" y1="1875" x2="1550" y2="1875" class="msg" /><text x="825" y="1867" class="label">5.7 publicarCUPOM_VALIDADO()</text>
  <line x1="720" y1="1910" x2="980" y2="1910" class="msg" /><text x="755" y="1902" class="label">5.8 manterArtefatosRF17()</text>
</svg>
