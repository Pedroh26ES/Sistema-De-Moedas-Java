quarkus.application.name=valoriza-ae
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0
quarkus.http.cors=true
quarkus.http.cors.origins=${VALORIZA_CORS_ORIGINS:http://localhost:5173,http://localhost:8080}
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.url=jdbc:h2:mem:valoriza-ae;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

quarkus.qute.suffixes=html
quarkus.log.category."br.com.sistemamoedas".level=INFO

valoriza.app.public-url=${VALORIZA_APP_PUBLIC_URL:http://localhost:8080}

valoriza.rabbitmq.host=${VALORIZA_RABBITMQ_HOST:localhost}
valoriza.rabbitmq.port=${VALORIZA_RABBITMQ_PORT:5672}
valoriza.rabbitmq.username=${VALORIZA_RABBITMQ_USERNAME:guest}
valoriza.rabbitmq.password=${VALORIZA_RABBITMQ_PASSWORD:guest}
valoriza.rabbitmq.queue=${VALORIZA_RABBITMQ_QUEUE:valoriza-ae.eventos}
valoriza.rabbitmq.fail-on-startup=${VALORIZA_RABBITMQ_FAIL_ON_STARTUP:false}
valoriza.rabbitmq.auto-start=${VALORIZA_RABBITMQ_AUTO_START:true}
valoriza.rabbitmq.local-fallback=${VALORIZA_RABBITMQ_LOCAL_FALLBACK:true}

valoriza.emailjs.enabled=${VALORIZA_EMAILJS_ENABLED:true}
valoriza.emailjs.endpoint=https://api.emailjs.com/api/v1.0/email/send
valoriza.emailjs.service-id=${VALORIZA_EMAILJS_SERVICE_ID:service_hcguqt8}
valoriza.emailjs.template-id=${VALORIZA_EMAILJS_TEMPLATE_ID:template_l6qeu1d}
valoriza.emailjs.public-key=${VALORIZA_EMAILJS_PUBLIC_KEY:DNElHG9dfV97S6O_U}
valoriza.emailjs.private-key=${VALORIZA_EMAILJS_PRIVATE_KEY:gu3bxQw3GZzeFNmQWuutc}
valoriza.emailjs.ignored-domains=${VALORIZA_EMAILJS_IGNORED_DOMAINS:moedas.com}

valoriza.whatsapp.enabled=${VALORIZA_WHATSAPP_ENABLED:false}
valoriza.whatsapp.endpoint=${VALORIZA_WHATSAPP_ENDPOINT:http://localhost:3000}
valoriza.whatsapp.session=${VALORIZA_WHATSAPP_SESSION:default}
valoriza.whatsapp.api-key=${VALORIZA_WHATSAPP_API_KEY:valoriza-waha-key}
valoriza.whatsapp.recipient-overrides=${VALORIZA_WHATSAPP_RECIPIENT_OVERRIDES:}
valoriza.whatsapp.default-chat-id=${VALORIZA_WHATSAPP_DEFAULT_CHAT_ID:}
valoriza.whatsapp.fail-on-error=${VALORIZA_WHATSAPP_FAIL_ON_ERROR:false}
valoriza.whatsapp.humanized-replies=${VALORIZA_WHATSAPP_HUMANIZED_REPLIES:true}
valoriza.whatsapp.typing-enabled=${VALORIZA_WHATSAPP_TYPING_ENABLED:true}
valoriza.whatsapp.typing-min-ms=${VALORIZA_WHATSAPP_TYPING_MIN_MS:900}
valoriza.whatsapp.typing-max-ms=${VALORIZA_WHATSAPP_TYPING_MAX_MS:3200}
valoriza.whatsapp.typing-ms-per-char=${VALORIZA_WHATSAPP_TYPING_MS_PER_CHAR:18}

integracoes.viacep.base-url=https://viacep.com.br/ws

%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:valoriza-ae-test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.valoriza.emailjs.enabled=false
%test.valoriza.whatsapp.enabled=false
%test.valoriza.whatsapp.humanized-replies=false
