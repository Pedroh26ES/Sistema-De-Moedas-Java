services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valoriza-ae-app
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      waha:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      VALORIZA_APP_PUBLIC_URL: ${VALORIZA_APP_PUBLIC_URL:-http://localhost:8080}
      VALORIZA_CORS_ORIGINS: ${VALORIZA_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      VALORIZA_RABBITMQ_HOST: rabbitmq
      VALORIZA_RABBITMQ_PORT: 5672
      VALORIZA_RABBITMQ_USERNAME: ${VALORIZA_RABBITMQ_USERNAME:-valoriza}
      VALORIZA_RABBITMQ_PASSWORD: ${VALORIZA_RABBITMQ_PASSWORD:-valoriza-local-rabbitmq}
      VALORIZA_RABBITMQ_QUEUE: valoriza-ae.eventos
      VALORIZA_RABBITMQ_FAIL_ON_STARTUP: "true"
      VALORIZA_RABBITMQ_AUTO_START: "false"
      VALORIZA_RABBITMQ_LOCAL_FALLBACK: "false"
      VALORIZA_EMAILJS_ENABLED: ${VALORIZA_EMAILJS_ENABLED:-false}
      VALORIZA_EMAILJS_SERVICE_ID: ${VALORIZA_EMAILJS_SERVICE_ID:-}
      VALORIZA_EMAILJS_TEMPLATE_ID: ${VALORIZA_EMAILJS_TEMPLATE_ID:-}
      VALORIZA_EMAILJS_PUBLIC_KEY: ${VALORIZA_EMAILJS_PUBLIC_KEY:-}
      VALORIZA_EMAILJS_PRIVATE_KEY: ${VALORIZA_EMAILJS_PRIVATE_KEY:-}
      VALORIZA_EMAILJS_IGNORED_DOMAINS: ${VALORIZA_EMAILJS_IGNORED_DOMAINS:-moedas.com}
      VALORIZA_WHATSAPP_ENABLED: ${VALORIZA_WHATSAPP_ENABLED:-false}
      VALORIZA_WHATSAPP_ENDPOINT: http://waha:3000
      VALORIZA_WHATSAPP_SESSION: ${VALORIZA_WHATSAPP_SESSION:-default}
      VALORIZA_WHATSAPP_API_KEY: ${VALORIZA_WHATSAPP_API_KEY:?Defina VALORIZA_WHATSAPP_API_KEY ou rode start.ps1}
      VALORIZA_WHATSAPP_FAIL_ON_ERROR: ${VALORIZA_WHATSAPP_FAIL_ON_ERROR:-false}
      VALORIZA_WHATSAPP_RECIPIENT_OVERRIDES: ${VALORIZA_WHATSAPP_RECIPIENT_OVERRIDES:-}

  waha:
    image: devlikeapro/waha:latest
    container_name: valoriza-waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      WAHA_API_KEY: ${VALORIZA_WHATSAPP_API_KEY:?Defina VALORIZA_WHATSAPP_API_KEY ou rode start.ps1}
      WAHA_DASHBOARD_USERNAME: ${VALORIZA_WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${VALORIZA_WAHA_DASHBOARD_PASSWORD:?Defina VALORIZA_WAHA_DASHBOARD_PASSWORD ou rode start.ps1}
      WHATSAPP_SWAGGER_USERNAME: ${VALORIZA_WAHA_DASHBOARD_USERNAME:-admin}
      WHATSAPP_SWAGGER_PASSWORD: ${VALORIZA_WAHA_DASHBOARD_PASSWORD:?Defina VALORIZA_WAHA_DASHBOARD_PASSWORD ou rode start.ps1}
      WHATSAPP_HOOK_URL: ${VALORIZA_WAHA_HOOK_URL:-http://host.docker.internal:8080/api/whatsapp/webhook}
      WHATSAPP_HOOK_EVENTS: ${VALORIZA_WAHA_HOOK_EVENTS:-message}
    volumes:
      - valoriza-waha-sessions:/app/.sessions

  rabbitmq:
    image: rabbitmq:3-management
    container_name: valoriza-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${VALORIZA_RABBITMQ_USERNAME:-valoriza}
      RABBITMQ_DEFAULT_PASS: ${VALORIZA_RABBITMQ_PASSWORD:-valoriza-local-rabbitmq}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - valoriza-rabbitmq-data:/var/lib/rabbitmq

volumes:
  valoriza-rabbitmq-data:
  valoriza-waha-sessions:
